name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Plain `mvn` build — no atlas-* CLI required. AMPS is wired in pom.xml
      # (bitbucket-maven-plugin with <extensions>true</extensions>) and the
      # Atlassian Maven repository is declared there too.
      - name: Build and run tests
        run: mvn -B -ntp clean verify

      - name: Upload plugin artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bitbucket-codeowners-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 14
