name: Build (Bitbucket 9.x LTS)

# Compatibility build targeting Bitbucket DC 9.3 (Java 17), via the `bb9` Maven profile.
# Run manually from the Actions tab (workflow_dispatch) or by pushing a verify/** branch.
on:
  workflow_dispatch:
  push:
    branches: ['verify/**']

jobs:
  bb9:
    name: Build & test (Bitbucket 9.3 / Java 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build (bb9 profile)
        run: mvn -B -ntp -Pbb9 clean verify

      - name: Upload bb9 plugin artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: bitbucket-codeowners-bb9-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 14
