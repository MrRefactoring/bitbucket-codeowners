# i18n strings for the Code Owners merge check plugin

bitbucket-codeowners.plugin.name=Bitbucket Code Owners
bitbucket-codeowners.plugin.description=Path-based code ownership with subgroup approval thresholds.

codeowners.mergecheck.name=Code Owners Merge Check
codeowners.mergecheck.description=Blocks a merge until the configured number of approvals from the required code-owner groups is reached for the paths changed in the pull request.

# Veto messages (parameters are substituted by the check at runtime)
codeowners.veto.summary=Code owner approval required
codeowners.veto.group=Path "{0}" requires {1} approval(s) from "{2}" (currently {3}).
codeowners.config.invalid.summary=Invalid .bitbucket/codeowners.yml
codeowners.config.invalid.details=The code owners configuration could not be parsed: {0}
